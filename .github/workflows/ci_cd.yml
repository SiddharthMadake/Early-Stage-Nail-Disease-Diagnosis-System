name: Nail Disease CI Pipeline

on:
  push:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.9"

    - run: pip install -r requirements.txt

    - name: Download Model
      run: |
        pip install gdown
        gdown --fuzzy "https://drive.google.com/file/d/1Vs7AgzN4mJfBYfLYhNXF7AAROq9SPCz1/view" -O vgg-16-nail-disease.h5

    - name: Check Files
      run: ls -l

    - run: echo "CI Passed "

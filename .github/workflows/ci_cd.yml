name: Nail Disease CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.9"

    - name: Install Dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Download Model
      run: |
        pip install gdown
        gdown https://drive.google.com/uc?id=1Vs7AgzN4mJfBYfLYhNXF7AAROq9SPCz1

    - name: Check Files
      run: ls -l   

    - name: Rename Model
      run: |
        FILE=$(ls *.h5 | head -n 1)
        mv "$FILE" vgg-16-nail-disease.h5

    - name: Done
      run: echo "CI Passed ✅"
